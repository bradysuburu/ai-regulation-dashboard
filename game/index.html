function currentMap() {
  return maps[game.mapId];
}

function getTile(x, y) {
  const map = currentMap();
  if (x < 0 || y < 0 || y >= map.layout.length || x >= map.layout[0].length) {
    return "#";
  }
  return map.layout[y][x];
}

function isBlockedTile(tile) {
  return tile === "#" || tile === "^" || tile === "~" || tile === "s";
}

function npcAt(x, y) {
  return currentMap().npcs.find(npc => npc.x === x && npc.y === y);
}

function portalAt(x, y) {
  return currentMap().portals.find(portal => portal.x === x && portal.y === y);
}

function canMoveTo(x, y) {
  const tile = getTile(x, y);
  if (isBlockedTile(tile)) return false;
  if (npcAt(x, y)) return false;
  return true;
}

function movePlayer(dx, dy) {
  if (game.mode !== "play") return;

  const nx = game.player.x + dx;
  const ny = game.player.y + dy;

  if (canMoveTo(nx, ny)) {
    game.player.x = nx;
    game.player.y = ny;
  }

  const portal = portalAt(game.player.x, game.player.y);
  if (portal) {
    changeMap(portal.to, portal.spawnX, portal.spawnY);
  }
}

function changeMap(mapId, spawnX, spawnY) {
  game.mapId = mapId;
  game.player.x = spawnX;
  game.player.y = spawnY;
  startDialogue([
    `Entered ${currentMap().title}.`,
    currentMap().subtitle
  ]);
}

function getFacingNPC() {
  const directions = [
    { x: game.player.x, y: game.player.y - 1 },
    { x: game.player.x, y: game.player.y + 1 },
    { x: game.player.x - 1, y: game.player.y },
    { x: game.player.x + 1, y: game.player.y }
  ];

  for (const d of directions) {
    const npc = npcAt(d.x, d.y);
    if (npc) return npc;
  }

  return null;
}

function interact() {
  if (game.mode !== "play") return;

  const npc = getFacingNPC();
  if (npc) {
    talkToNPC(npc);
    return;
  }

  const nearbyPortal = currentMap().portals.find(portal => {
    const distance = Math.abs(portal.x - game.player.x) + Math.abs(portal.y - game.player.y);
    return distance === 1;
  });

  if (nearbyPortal) {
    startDialogue([
      nearbyPortal.label,
      "Walk onto the glowing tile to travel."
    ]);
    return;
  }

  startDialogue([
    "There is nothing to inspect here.",
    "Keep exploring and talk to people marked by bright colors."
  ]);
}

function talkToNPC(npc) {
  game.pendingNPC = npc;
  game.selectedChoice = 0;

  if (npc.finalBoss && !hasRequiredBadgesForFinal()) {
    startDialogue([
      `${npc.name}: You are not ready yet.`,
      "Collect the Prompt, Privacy, Fairness, Media, and Oversight badges first.",
      `Current badges: ${game.badges.length}/5`
    ]);
    return;
  }

  if (game.flags[npc.id]) {
    const lines = [
      `${npc.name}: You already solved this conflict.`,
      `Lesson: ${npc.lesson}`
    ];
    startDialogue(lines);
    return;
  }

  const lines = npc.intro.map(line => `${npc.name}: ${line}`);
  lines.push("CHOICE_START");
  game.dialogueQueue = lines;
  game.dialogueIndex = 0;
  game.mode = "dialogue";
}

function hasRequiredBadgesForFinal() {
  const required = [
    "Prompt Badge",
    "Privacy Badge",
    "Fairness Badge",
    "Media Badge",
    "Oversight Badge"
  ];

  return required.every(badge => game.badges.includes(badge));
}

function startDialogue(lines) {
  game.dialogueQueue = lines;
  game.dialogueIndex = 0;
  game.mode = "dialogue";
  game.pendingNPC = null;
}

function advanceDialogue() {
  if (game.mode !== "dialogue") return;

  const currentLine = game.dialogueQueue[game.dialogueIndex];

  if (currentLine === "CHOICE_START") {
    game.mode = "choice";
    game.selectedChoice = 0;
    return;
  }

  game.dialogueIndex++;

  if (game.dialogueIndex >= game.dialogueQueue.length) {
    game.mode = "play";
    game.dialogueQueue = [];
    game.dialogueIndex = 0;
  }
}

function chooseOption() {
  if (game.mode !== "choice") return;

  const npc = game.pendingNPC;
  const choice = npc.choices[game.selectedChoice];

  if (choice.correct) {
    game.flags[npc.id] = true;

    if (!game.badges.includes(npc.badge)) {
      game.badges.push(npc.badge);
      game.score += 100;
    }

    const lines = [
      `${npc.name}: ${choice.feedback}`,
      `Lesson: ${npc.lesson}`,
      `Badge earned: ${npc.badge}`,
      ...npc.completeText
    ];

    if (npc.finalBoss) {
      lines.push("THE END — You completed the SafelyAI training quest.");
      lines.push("Refresh the page to play again or expand the world.");
    }

    game.pendingNPC = null;
    startDialogue(lines);
  } else {
    const lines = [
      `${npc.name}: ${choice.feedback}`,
      "Think it through and try again.",
      "CHOICE_START"
    ];

    game.dialogueQueue = lines;
    game.dialogueIndex = 0;
    game.mode = "dialogue";
  }
}

function wrapText(text, maxChars) {
  const words = text.split(" ");
  const lines = [];
  let line = "";

  for (const word of words) {
    if ((line + word).length > maxChars) {
      lines.push(line.trim());
      line = "";
    }
    line += word + " ";
  }

  if (line.trim().length > 0) {
    lines.push(line.trim());
  }

  return lines;
}

function drawTile(tile, x, y) {
  const px = x * TILE;
  const py = y * TILE;

  if (tile === "#") {
    ctx.fillStyle = COLORS.wall;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = COLORS.wallTop;
    ctx.fillRect(px, py, TILE, 6);
  } else if (tile === ",") {
    ctx.fillStyle = COLORS.grass;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = COLORS.grass2;
    ctx.fillRect(px + 4, py + 20, 4, 4);
    ctx.fillRect(px + 18, py + 10, 4, 4);
  } else if (tile === "^") {
    ctx.fillStyle = COLORS.tree;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = COLORS.grass2;
    ctx.fillRect(px + 8, py + 4, 16, 18);
  } else if (tile === "~") {
    ctx.fillStyle = COLORS.water;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = "#73c2fb";
    ctx.fillRect(px + 4, py + 10, 14, 3);
    ctx.fillRect(px + 16, py + 22, 10, 3);
  } else if (tile === "=") {
    ctx.fillStyle = COLORS.dock;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = "#b5824f";
    ctx.fillRect(px, py + 14, TILE, 4);
  } else if (tile === "s") {
    ctx.fillStyle = COLORS.sand;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = "#d8c39a";
    ctx.fillRect(px + 4, py + 5, 8, 3);
  } else if (tile === "P" || tile === "D" || tile === "B" || tile === "M" || tile === "A" || tile === "C") {
    ctx.fillStyle = COLORS.floor;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = COLORS.machine;
    ctx.fillRect(px + 6, py + 6, 20, 20);
    ctx.fillStyle = COLORS.success;
    ctx.fillRect(px + 11, py + 11, 10, 4);
  } else if (tile === ">" || tile === "<") {
    ctx.fillStyle = COLORS.floor;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = COLORS.portal;
    ctx.fillRect(px + 8, py + 4, 16, 24);
    ctx.fillStyle = "#ffdd00";
    ctx.fillRect(px + 12, py + 8, 8, 16);
  } else {
    ctx.fillStyle = COLORS.floor;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = "rgba(255,255,255,0.04)";
    ctx.fillRect(px, py, TILE, 2);
  }
}

function drawMap() {
  const map = currentMap();

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(map.layout[y][x], x, y);
    }
  }
}

function drawNPCs() {
  for (const npc of currentMap().npcs) {
    const px = npc.x * TILE;
    const py = npc.y * TILE;

    const completed = game.flags[npc.id];

    ctx.fillStyle = completed ? COLORS.success : npc.color;
    ctx.fillRect(px + 8, py + 6, 16, 22);

    ctx.fillStyle = COLORS.black;
    ctx.fillRect(px + 12, py + 12, 3, 3);
    ctx.fillRect(px + 18, py + 12, 3, 3);

    if (!completed) {
      ctx.fillStyle = COLORS.white;
      ctx.font = "12px monospace";
      ctx.fillText("!", px + 13, py - 2);
    }
  }
}

function drawPlayer() {
  const px = game.player.x * TILE;
  const py = game.player.y * TILE;

  ctx.fillStyle = COLORS.player;
  ctx.fillRect(px + 8, py + 6, 16, 22);

  ctx.fillStyle = COLORS.playerDark;
  ctx.fillRect(px + 8, py + 22, 16, 6);

  ctx.fillStyle = COLORS.white;
  ctx.fillRect(px + 12, py + 12, 3, 3);
  ctx.fillRect(px + 18, py + 12, 3, 3);
}

function drawHUD() {
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.fillRect(0, 0, canvas.width, 42);

  ctx.fillStyle = COLORS.white;
  ctx.font = "14px monospace";
  ctx.fillText(currentMap().title, 12, 17);

  ctx.font = "10px monospace";
  ctx.fillStyle = "#b8c1ec";
  ctx.fillText(currentMap().subtitle, 12, 32);

  ctx.fillStyle = COLORS.success;
  ctx.font = "11px monospace";
  ctx.fillText(`Score: ${game.score}`, 420, 17);
  ctx.fillText(`Badges: ${game.badges.length}/6`, 420, 32);
}

function drawBadges() {
  if (game.badges.length === 0) return;

  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(438, 364, 190, 72);

  ctx.fillStyle = COLORS.white;
  ctx.font = "10px monospace";
  ctx.fillText("BADGES", 448, 380);

  ctx.fillStyle = COLORS.success;
  for (let i = 0; i < game.badges.length; i++) {
    ctx.fillText("- " + game.badges[i], 448, 396 + i * 10);
  }
}

function drawDialogueBox() {
  if (game.mode !== "dialogue" && game.mode !== "choice") return;

  ctx.fillStyle = COLORS.panel;
  ctx.fillRect(24, 292, 592, 132);

  ctx.strokeStyle = COLORS.panelBorder;
  ctx.lineWidth = 3;
  ctx.strokeRect(24, 292, 592, 132);

  ctx.fillStyle = COLORS.text;
  ctx.font = "14px monospace";

  if (game.mode === "dialogue") {
    const text = game.dialogueQueue[game.dialogueIndex];

    if (text === "CHOICE_START") {
      advanceDialogue();
      return;
    }

    const lines = wrapText(text, 64);
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], 44, 326 + i * 18);
    }

    ctx.fillStyle = "#b8c1ec";
    ctx.font = "11px monospace";
    ctx.fillText("Press Space / Enter", 455, 408);
  }

  if (game.mode === "choice") {
    const npc = game.pendingNPC;

    ctx.fillStyle = COLORS.white;
    ctx.font = "13px monospace";

    const qLines = wrapText(npc.question, 68);
    for (let i = 0; i < qLines.length; i++) {
      ctx.fillText(qLines[i], 44, 316 + i * 16);
    }

    for (let i = 0; i < npc.choices.length; i++) {
      const y = 366 + i * 18;
      ctx.fillStyle = i === game.selectedChoice ? COLORS.success : COLORS.text;
      const marker = i === game.selectedChoice ? ">" : " ";
      ctx.fillText(`${marker} ${npc.choices[i].text}`, 44, y);
    }
  }
}

function drawTitleScreenEffect() {
  ctx.fillStyle = "rgba(111, 255, 233, 0.06)";
  for (let i = 0; i < 30; i++) {
    const x = (i * 97 + Date.now() / 40) % canvas.width;
    const y = (i * 53) % canvas.height;
    ctx.fillRect(x, y, 2, 2);
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMap();
  drawTitleScreenEffect();
  drawNPCs();
  drawPlayer();
  drawHUD();
  drawBadges();
  drawDialogueBox();

  requestAnimationFrame(render);
}

document.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();

  if (game.mode === "play") {
    if (key === "arrowup" || key === "w") movePlayer(0, -1);
    if (key === "arrowdown" || key === "s") movePlayer(0, 1);
    if (key === "arrowleft" || key === "a") movePlayer(-1, 0);
    if (key === "arrowright" || key === "d") movePlayer(1, 0);

    if (key === " " || key === "enter") {
      interact();
    }
  } else if (game.mode === "dialogue") {
    if (key === " " || key === "enter") {
      advanceDialogue();
    }
  } else if (game.mode === "choice") {
    if (key === "arrowup" || key === "w") {
      game.selectedChoice--;
      if (game.selectedChoice < 0) game.selectedChoice = game.pendingNPC.choices.length - 1;
    }

    if (key === "arrowdown" || key === "s") {
      game.selectedChoice++;
      if (game.selectedChoice >= game.pendingNPC.choices.length) game.selectedChoice = 0;
    }

    if (key === " " || key === "enter") {
      chooseOption();
    }
  }
});

startDialogue([
  "You are a young Signal Keeper in a city powered by AI.",
  "The city model, AURA, was built to help people learn, work, and make decisions.",
  "But a strange fog has spread: hallucinations, deepfakes, biased outputs, data leaks, and blind automation.",
  "Travel through each region, solve AI conflicts, earn safety badges, and restore the Human Signal."
]);

render();
</script>
</body>
</html>
